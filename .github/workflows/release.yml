name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
            artifact: DitherAnalyser-linux-x86_64
          - os: macos-14
            name: macOS
            artifact: DitherAnalyser-macos-arm64
          - os: windows-latest
            name: Windows
            artifact: DitherAnalyser-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ── Install Qt6 (cached by the action) ──
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'
          cache: true

      # ── Linux dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcfitsio-dev wcslib-dev libgsl-dev

      # ── macOS dependencies ──
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cfitsio wcslib gsl
          echo "PKG_CONFIG_PATH=$(brew --prefix cfitsio)/lib/pkgconfig:$(brew --prefix wcslib)/lib/pkgconfig:$(brew --prefix gsl)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix cfitsio);$(brew --prefix wcslib);$(brew --prefix gsl)" >> $GITHUB_ENV

      # ── Windows dependencies ──
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install cfitsio gsl --triplet x64-windows

      # ── Cache stellarsolver build ──
      - name: Cache stellarsolver
        id: cache-stellarsolver
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps
          key: stellarsolver-${{ runner.os }}-${{ runner.arch }}-v2

      # ── Build stellarsolver only on cache miss ──
      - name: Build stellarsolver
        if: steps.cache-stellarsolver.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/rlancaste/stellarsolver.git /tmp/stellarsolver
          cd /tmp/stellarsolver
          mkdir build && cd build
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps" \
              -DCMAKE_PREFIX_PATH="$Qt6_DIR;$GITHUB_WORKSPACE/deps" \
              -DBUILD_TESTER=OFF
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps" \
              -DCMAKE_PREFIX_PATH="$Qt6_DIR;$(brew --prefix cfitsio);$(brew --prefix wcslib);$(brew --prefix gsl)" \
              -DBUILD_TESTER=OFF
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps" \
              -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
              -DBUILD_TESTER=OFF
          fi
          cmake --build . --parallel
          cmake --install .

      # ── Build DitherAnalyser ──
      - name: Configure
        shell: bash
        run: |
          mkdir -p build && cd build
          CMAKE_EXTRA=""
          PREFIX_PATH="$Qt6_DIR;$GITHUB_WORKSPACE/deps"
          if [ "$RUNNER_OS" == "Windows" ]; then
            CMAKE_EXTRA="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            PREFIX_PATH="$PREFIX_PATH;$(brew --prefix cfitsio);$(brew --prefix wcslib);$(brew --prefix gsl)"
          fi
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PREFIX_PATH" \
            $CMAKE_EXTRA

      - name: Build
        run: cmake --build build --parallel --config Release

      # ── Package ──
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg
          cp build/DitherAnalyser pkg/
          cp "$GITHUB_WORKSPACE"/deps/lib/libstellarsolver*.so* pkg/ || true
          cd pkg
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p pkg
          cp build/DitherAnalyser pkg/
          $Qt6_DIR/../../bin/macdeployqt pkg/DitherAnalyser || true
          cp "$GITHUB_WORKSPACE"/deps/lib/libstellarsolver*.dylib pkg/ || true
          cd pkg
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p pkg
          cp build/Release/DitherAnalyser.exe pkg/
          "$Qt6_DIR/../../bin/windeployqt.exe" pkg/DitherAnalyser.exe || true
          cp "$GITHUB_WORKSPACE"/deps/bin/*.dll pkg/ || true
          cd pkg
          7z a ../${{ matrix.artifact }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
