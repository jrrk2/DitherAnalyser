name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
            artifact: DitherAnalyser-linux-x86_64
            stellarsolver: ON
          - os: macos-14
            name: macOS
            artifact: DitherAnalyser-macos-arm64
            stellarsolver: OFF
          - os: windows-latest
            name: Windows
            artifact: DitherAnalyser-windows-x86_64
            stellarsolver: OFF

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ── Install Qt6 (cached by the action) ──
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: ${{ runner.os == 'Windows' && 'win64_mingw' || '' }}
          modules: 'qtcharts'
          cache: true

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          tools: 'tools_mingw1310'
          cache: true

      # ── Linux dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcfitsio-dev wcslib-dev libgsl-dev

      # ── macOS dependencies ──
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cfitsio
          echo "PKG_CONFIG_PATH=$(brew --prefix cfitsio)/lib/pkgconfig" >> $GITHUB_ENV

      # ── Windows dependencies (build zlib + cfitsio with MinGW) ──
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Build zlib first (cfitsio dependency)
          curl -sL https://zlib.net/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps/zlib"
          cmake --build . --parallel
          cmake --install .
          cd ../..

          # Build cfitsio
          curl -sL https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.4.1.tar.gz | tar xz
          cd cfitsio-4.4.1
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps/cfitsio" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/deps/zlib" \
            -DBUILD_SHARED_LIBS=ON
          cmake --build . --parallel
          cmake --install .

      # ── Cache stellarsolver build ──
      - name: Cache stellarsolver
        if: matrix.stellarsolver == 'ON'
        id: cache-stellarsolver
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps
          key: stellarsolver-${{ runner.os }}-${{ runner.arch }}-v2

      # ── Build stellarsolver only on cache miss ──
      - name: Build stellarsolver
        if: matrix.stellarsolver == 'ON' && steps.cache-stellarsolver.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/rlancaste/stellarsolver.git /tmp/stellarsolver
          cd /tmp/stellarsolver
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/deps" \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DBUILD_TESTER=OFF
          cmake --build . --parallel
          cmake --install .

      # ── Build DitherAnalyser ──
      - name: Configure
        shell: bash
        run: |
          mkdir -p build && cd build
          CMAKE_EXTRA=""
          PREFIX_PATH="$Qt6_DIR;$GITHUB_WORKSPACE/deps"
          if [ "$RUNNER_OS" == "Windows" ]; then
            PREFIX_PATH="$Qt6_DIR;$GITHUB_WORKSPACE/deps/cfitsio;$GITHUB_WORKSPACE/deps/zlib"
            CMAKE_EXTRA="-G Ninja"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            PREFIX_PATH="$PREFIX_PATH;$(brew --prefix cfitsio)"
          fi
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PREFIX_PATH" \
            -DENABLE_STELLARSOLVER=${{ matrix.stellarsolver }} \
            $CMAKE_EXTRA

      - name: Build
        run: cmake --build build --parallel --config Release

      # ── Package ──
      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          # Get linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/DitherAnalyser AppDir/usr/bin/
          cp "$GITHUB_WORKSPACE"/deps/lib/libstellarsolver*.so* AppDir/usr/lib/ || true

          # Desktop file
          cat > AppDir/usr/share/applications/DitherAnalyser.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=DitherAnalyser
          Exec=DitherAnalyser
          Icon=DitherAnalyser
          Categories=Science;Astronomy;
          DESKTOP
          sed -i 's/^          //' AppDir/usr/share/applications/DitherAnalyser.desktop

          # Placeholder icon
          convert -size 256x256 xc:'#1e1e2e' -fill '#89b4fa' -gravity center \
            -pointsize 48 -annotate 0 'DA' \
            AppDir/usr/share/icons/hicolor/256x256/apps/DitherAnalyser.png 2>/dev/null \
            || touch AppDir/usr/share/icons/hicolor/256x256/apps/DitherAnalyser.png

          export QMAKE=$QT_ROOT_DIR/bin/qmake6
          export LD_LIBRARY_PATH=$QT_ROOT_DIR/lib:$GITHUB_WORKSPACE/deps/lib:$LD_LIBRARY_PATH
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          mv DitherAnalyser-*.AppImage ${{ matrix.artifact }}.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Create .app bundle
          mkdir -p DitherAnalyser.app/Contents/MacOS
          mkdir -p DitherAnalyser.app/Contents/Resources
          cp build/DitherAnalyser DitherAnalyser.app/Contents/MacOS/

          cat > DitherAnalyser.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>DitherAnalyser</string>
            <key>CFBundleIdentifier</key><string>com.github.jrrk2.DitherAnalyser</string>
            <key>CFBundleName</key><string>DitherAnalyser</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Bundle Qt frameworks
          $QT_ROOT_DIR/bin/macdeployqt DitherAnalyser.app -verbose=2

          # Fix Qt framework structure for codesign (macdeployqt leaves them incomplete)
          for fw in DitherAnalyser.app/Contents/Frameworks/Qt*.framework; do
            name=$(basename "$fw" .framework)
            # Ensure Versions/Current symlink exists
            if [ ! -L "$fw/Versions/Current" ]; then
              ln -sf A "$fw/Versions/Current"
            fi
            # Ensure top-level symlinks exist
            if [ ! -L "$fw/$name" ]; then
              ln -sf Versions/Current/$name "$fw/$name"
            fi
            if [ -d "$fw/Versions/A/Resources" ] && [ ! -L "$fw/Resources" ]; then
              ln -sf Versions/Current/Resources "$fw/Resources"
            fi
          done

          # Ad-hoc sign
          codesign --force --deep --sign - DitherAnalyser.app

          # Create DMG
          hdiutil create -volname DitherAnalyser -srcfolder DitherAnalyser.app \
            -ov -format UDZO ${{ matrix.artifact }}.dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p pkg
          cp build/DitherAnalyser.exe pkg/

          # Bundle Qt DLLs
          "$QT_ROOT_DIR/bin/windeployqt.exe" --release --no-translations \
            --no-system-d3d-compiler --no-opengl-sw pkg/DitherAnalyser.exe

          # Bundle cfitsio, zlib, and their dependencies
          cp "$GITHUB_WORKSPACE"/deps/cfitsio/bin/*.dll pkg/ || true
          cp "$GITHUB_WORKSPACE"/deps/zlib/bin/*.dll pkg/ || true

          # Bundle MSVC runtime DLLs
          MSVC_REDIST="$(vswhere -latest -find 'VC/Redist/MSVC/*/x64/Microsoft.VC*.CRT')"
          if [ -d "$MSVC_REDIST" ]; then
            cp "$MSVC_REDIST"/*.dll pkg/
          else
            # Fallback: copy from system
            for dll in msvcp140.dll msvcp140_1.dll vcruntime140.dll vcruntime140_1.dll; do
              find "C:/Windows" -name "$dll" 2>/dev/null | head -1 | xargs -I{} cp "{}" pkg/ || true
            done
          fi

          cd pkg
          7z a ../${{ matrix.artifact }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.AppImage
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.zip
